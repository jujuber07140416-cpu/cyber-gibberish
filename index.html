<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTE 必备词汇搭配 - 背诵·练习·测试</title>
<style>
/* ========== Reset & Base ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #4f46e5;
  --primary-light: #818cf8;
  --success: #059669;
  --danger: #dc2626;
  --warning: #d97706;
  --bg: #f8fafc;
  --card-bg: #ffffff;
  --text: #1e293b;
  --text-secondary: #64748b;
  --border: #e2e8f0;
  --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 25px rgba(0,0,0,.1), 0 4px 10px rgba(0,0,0,.05);
  --radius: 12px;
  --font-mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}

/* ========== Header ========== */
.app-header {
  background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
  color: #fff;
  padding: 16px 20px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-lg);
}
.app-header h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: .5px; }
.app-header p { font-size: .8rem; opacity: .7; margin-top: 2px; }

/* ========== Tab Navigation ========== */
.tab-nav {
  display: flex;
  background: #fff;
  border-bottom: 2px solid var(--border);
  position: sticky;
  top: 78px;
  z-index: 99;
}
.tab-btn {
  flex: 1;
  padding: 14px 10px;
  border: none;
  background: transparent;
  font-size: .95rem;
  font-weight: 600;
  cursor: pointer;
  color: var(--text-secondary);
  transition: all .2s;
  position: relative;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--primary); background: #f1f5f9; }
.tab-btn.active { color: var(--primary); }
.tab-btn.active::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 20%;
  right: 20%;
  height: 3px;
  background: var(--primary);
  border-radius: 2px;
}
.tab-icon { font-size: 1.2rem; display: block; }
.tab-label { font-size: .75rem; }

/* ========== Container ========== */
.container { max-width: 640px; margin: 0 auto; padding: 16px; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ========== Flashcard ========== */
.flashcard-wrapper { perspective: 1000px; margin: 24px 0; }
.flashcard {
  width: 100%;
  min-height: 220px;
  position: relative;
  cursor: pointer;
  transform-style: preserve-3d;
  transition: transform .5s cubic-bezier(.4,0,.2,1);
}
.flashcard.is-flipped { transform: rotateY(180deg); }
.flashcard-face {
  position: absolute;
  width: 100%;
  min-height: 220px;
  backface-visibility: hidden;
  border-radius: var(--radius);
  padding: 32px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow-lg);
}
.flashcard-front {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: #fff;
  z-index: 2;
}
.flashcard-back {
  background: #fff;
  border: 2px solid var(--border);
  transform: rotateY(180deg);
}
.flashcard-en {
  font-size: 1.6rem;
  font-weight: 700;
  text-align: center;
  word-break: break-word;
}
.flashcard-pos {
  font-size: .85rem;
  opacity: .8;
  margin-top: 8px;
}
.flashcard-hint { font-size: .75rem; opacity: .6; margin-top: 16px; }
.flashcard-zh {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--text);
  text-align: center;
}
.flashcard-detail {
  font-size: .9rem;
  color: var(--text-secondary);
  margin-top: 12px;
  text-align: center;
}

/* ========== Card Controls ========== */
.card-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 16px;
}
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  font-size: .9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
}
.btn:active { transform: scale(.96); }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: #4338ca; }
.btn-outline { background: #fff; color: var(--primary); border: 2px solid var(--primary); }
.btn-outline:hover { background: #eef2ff; }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { background: #047857; }
.btn-warning { background: var(--warning); color: #fff; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-sm { padding: 6px 14px; font-size: .8rem; }
.btn-lg { padding: 14px 28px; font-size: 1rem; border-radius: 12px; }
.btn:disabled { opacity: .5; cursor: not-allowed; }

/* ========== Progress ========== */
.progress-bar {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  margin: 12px 0;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--primary);
  border-radius: 3px;
  transition: width .3s;
}
.progress-info {
  display: flex;
  justify-content: space-between;
  font-size: .8rem;
  color: var(--text-secondary);
}

/* ========== Search / Filter ========== */
.filter-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.filter-bar input {
  flex: 1;
  min-width: 120px;
  padding: 10px 14px;
  border: 2px solid var(--border);
  border-radius: 8px;
  font-size: .9rem;
  outline: none;
  transition: border-color .2s;
}
.filter-bar input:focus { border-color: var(--primary); }
.filter-bar select {
  padding: 10px 14px;
  border: 2px solid var(--border);
  border-radius: 8px;
  font-size: .9rem;
  background: #fff;
  outline: none;
}

/* ========== Mastered Toggle ========== */
.mastered-btn {
  margin-top: 12px;
  font-size: .85rem;
  padding: 8px 16px;
  border-radius: 20px;
  cursor: pointer;
  border: 2px solid var(--border);
  background: #fff;
  transition: all .2s;
}
.mastered-btn.is-mastered {
  background: #d1fae5;
  border-color: var(--success);
  color: var(--success);
}

/* ========== Practice Mode ========== */
.practice-subtabs { display: flex; gap: 8px; margin-bottom: 16px; }
.practice-subtab {
  flex: 1;
  padding: 10px;
  border: 2px solid var(--border);
  border-radius: 8px;
  background: #fff;
  cursor: pointer;
  font-weight: 600;
  font-size: .85rem;
  text-align: center;
  transition: all .2s;
}
.practice-subtab.active { border-color: var(--primary); color: var(--primary); background: #eef2ff; }

.question-card {
  background: #fff;
  border-radius: var(--radius);
  padding: 28px 20px;
  box-shadow: var(--shadow-lg);
  margin-bottom: 16px;
  text-align: center;
}
.question-zh { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
.question-hint { font-size: .85rem; color: var(--text-secondary); margin-bottom: 20px; }

.options-grid {
  display: grid;
  gap: 10px;
}
.option-btn {
  display: block;
  width: 100%;
  padding: 14px 18px;
  border: 2px solid var(--border);
  border-radius: 10px;
  background: #fff;
  font-size: 1rem;
  cursor: pointer;
  text-align: left;
  transition: all .2s;
}
.option-btn:hover { border-color: var(--primary-light); background: #f8faff; }
.option-btn.correct { border-color: var(--success); background: #d1fae5; color: #065f46; }
.option-btn.wrong { border-color: var(--danger); background: #fee2e2; color: #991b1b; }
.option-btn.show-correct { border-color: var(--success); background: #f0fdf4; }

.fill-input {
  width: 100%;
  padding: 14px 18px;
  border: 2px solid var(--border);
  border-radius: 10px;
  font-size: 1.1rem;
  text-align: center;
  outline: none;
  transition: border-color .2s;
  font-family: var(--font-mono);
}
.fill-input:focus { border-color: var(--primary); }
.fill-input.correct { border-color: var(--success); background: #d1fae5; }
.fill-input.wrong { border-color: var(--danger); background: #fee2e2; }

.feedback-box {
  margin-top: 16px;
  padding: 14px 18px;
  border-radius: 10px;
  font-weight: 600;
  text-align: center;
  display: none;
}
.feedback-box.show { display: block; }
.feedback-box.success { background: #d1fae5; color: #065f46; }
.feedback-box.error { background: #fee2e2; color: #991b1b; }

/* ========== Test Mode ========== */
.test-setup, .test-active, .test-results { display: none; }
.test-setup.active, .test-active.active, .test-results.active { display: block; }

.test-count-btns { display: flex; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
.test-count-btn {
  flex: 1; min-width: 70px;
  padding: 16px; border: 2px solid var(--border);
  border-radius: 10px; background: #fff;
  cursor: pointer; font-size: 1.1rem; font-weight: 700;
  transition: all .2s; text-align: center;
}
.test-count-btn:hover, .test-count-btn.selected { border-color: var(--primary); color: var(--primary); background: #eef2ff; }

.test-timer {
  font-size: 1.5rem;
  font-weight: 700;
  text-align: center;
  padding: 12px;
  color: var(--primary);
  font-family: var(--font-mono);
}
.test-progress-text { text-align: center; font-size: .9rem; color: var(--text-secondary); margin-bottom: 8px; }

.result-summary {
  text-align: center;
  padding: 32px 20px;
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  margin-bottom: 20px;
}
.result-score {
  font-size: 4rem;
  font-weight: 800;
  background: linear-gradient(135deg, #667eea, #764ba2);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.result-label { font-size: 1rem; color: var(--text-secondary); margin-bottom: 8px; }
.result-detail { font-size: .9rem; color: var(--text-secondary); margin: 4px 0; }

.wrong-review {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 12px;
  overflow: hidden;
}
.wrong-review-header {
  padding: 14px 18px;
  background: #fef2f2;
  border-bottom: 1px solid #fecaca;
  font-weight: 600;
  font-size: .9rem;
}
.wrong-review-body { padding: 14px 18px; }
.wrong-review-row { margin-bottom: 6px; font-size: .9rem; }
.wrong-review-row strong { color: var(--danger); }
.wrong-review-row em { color: var(--success); font-style: normal; }

/* ========== Stats ========== */
.stats-bar {
  display: flex;
  gap: 12px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.stat-item {
  flex: 1;
  min-width: 80px;
  text-align: center;
  padding: 12px 8px;
  background: #fff;
  border-radius: 8px;
  box-shadow: var(--shadow);
}
.stat-num { font-size: 1.4rem; font-weight: 700; color: var(--primary); }
.stat-label { font-size: .7rem; color: var(--text-secondary); }

/* ========== Responsive ========== */
@media (max-width: 480px) {
  .container { padding: 10px; }
  .flashcard-en { font-size: 1.3rem; }
  .flashcard-zh { font-size: 1.2rem; }
  .flashcard { min-height: 180px; }
  .flashcard-face { min-height: 180px; padding: 20px 16px; }
  .btn { padding: 8px 14px; font-size: .82rem; }
  .btn-lg { padding: 12px 22px; font-size: .9rem; }
  .question-zh { font-size: 1.2rem; }
  .tab-btn { padding: 10px 6px; }
  .tab-icon { font-size: 1rem; }
  .tab-label { font-size: .7rem; }
  .app-header h1 { font-size: 1.1rem; }
}

/* ========== Empty State ========== */
.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--text-secondary);
}
.empty-state .icon { font-size: 3rem; margin-bottom: 16px; }

/* ========== Toast ========== */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 24px;
  background: #1e293b;
  color: #fff;
  border-radius: 20px;
  font-size: .85rem;
  font-weight: 600;
  z-index: 200;
  opacity: 0;
  transition: opacity .3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- Header -->
<div class="app-header">
  <h1>📚 PTE 必备词汇搭配</h1>
  <p>Collocation Builder — 背诵 · 练习 · 测试</p>
</div>

<!-- Tab Navigation -->
<div class="tab-nav" id="tabNav">
  <button class="tab-btn active" data-tab="memorize">
    <span class="tab-icon">📖</span>
    <span class="tab-label">背诵 Memorize</span>
  </button>
  <button class="tab-btn" data-tab="practice">
    <span class="tab-icon">✏️</span>
    <span class="tab-label">练习 Practice</span>
  </button>
  <button class="tab-btn" data-tab="test">
    <span class="tab-icon">📝</span>
    <span class="tab-label">测试 Test</span>
  </button>
</div>

<!-- Container -->
<div class="container" id="appContainer">

  <!-- ==================== MEMORIZE TAB ==================== -->
  <div class="tab-content active" id="tab-memorize">
    <!-- Stats -->
    <div class="stats-bar" id="memorizeStats"></div>

    <!-- Filter -->
    <div class="filter-bar">
      <input type="text" id="memSearch" placeholder="🔍 搜索英文或中文...">
      <select id="memLetter">
        <option value="all">全部字母</option>
      </select>
      <select id="memFilter">
        <option value="all">全部词汇</option>
        <option value="unmastered">未掌握</option>
        <option value="mastered">已掌握</option>
      </select>
    </div>

    <!-- Progress -->
    <div class="progress-bar"><div class="progress-fill" id="memProgressFill" style="width:0%"></div></div>
    <div class="progress-info">
      <span id="memProgressText">1 / 2469</span>
      <span id="memMasteredText">已掌握: 0</span>
    </div>

    <!-- Flashcard -->
    <div class="flashcard-wrapper">
      <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div class="flashcard-face flashcard-front">
          <div class="flashcard-en" id="fcFront"></div>
          <div class="flashcard-pos" id="fcFrontPos"></div>
          <div class="flashcard-hint">👆 点击翻转查看中文</div>
        </div>
        <div class="flashcard-face flashcard-back">
          <div class="flashcard-zh" id="fcBack"></div>
          <div class="flashcard-detail" id="fcBackDetail"></div>
        </div>
      </div>
    </div>

    <!-- Controls -->
    <div class="card-controls">
      <button class="btn btn-outline" onclick="prevCard()" title="上一个">◀ 上一个</button>
      <button class="btn btn-outline" onclick="randomCard()" title="随机">🔀 随机</button>
      <button class="btn btn-outline" onclick="nextCard()" title="下一个">下一个 ▶</button>
    </div>
    <div style="text-align:center;">
      <button class="mastered-btn" id="masteredBtn" onclick="toggleMastered()">⭐ 标记为已掌握</button>
    </div>
  </div>

  <!-- ==================== PRACTICE TAB ==================== -->
  <div class="tab-content" id="tab-practice">
    <div class="stats-bar" id="practiceStats"></div>

    <!-- Sub-tabs -->
    <div class="practice-subtabs">
      <button class="practice-subtab active" data-subtab="choice">📋 选择题</button>
      <button class="practice-subtab" data-subtab="fill">✍️ 填空题</button>
    </div>

    <!-- Choice Exercise -->
    <div id="practiceChoice">
      <div class="question-card" id="choiceQuestion">
        <div class="question-hint">选择正确的中文含义对应的英文搭配</div>
        <div class="question-zh" id="choiceZh"></div>
        <div class="options-grid" id="choiceOptions"></div>
        <div class="feedback-box" id="choiceFeedback"></div>
        <div style="margin-top:16px; text-align:center;">
          <button class="btn btn-primary" id="choiceNextBtn" onclick="nextChoice()" style="display:none;">下一题 ▶</button>
        </div>
      </div>
    </div>

    <!-- Fill-in-blank Exercise -->
    <div id="practiceFill" style="display:none;">
      <div class="question-card">
        <div class="question-hint">根据中文提示，补全英文搭配（输入缺失的单词）</div>
        <div style="font-size:1.1rem; margin-bottom:8px;" id="fillPrompt"></div>
        <div class="question-zh" id="fillZh" style="font-size:1.1rem;"></div>
        <div style="margin-top:16px;">
          <input type="text" class="fill-input" id="fillInput" placeholder="输入缺失的单词..." autocomplete="off" autocapitalize="off">
        </div>
        <div class="feedback-box" id="fillFeedback"></div>
        <div style="margin-top:16px; text-align:center;">
          <button class="btn btn-outline btn-sm" onclick="checkFillAnswer()">✅ 检查</button>
          <button class="btn btn-outline btn-sm" onclick="showFillHint()">💡 提示</button>
          <button class="btn btn-primary btn-sm" id="fillNextBtn" onclick="nextFill()" style="display:none;">下一题 ▶</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ==================== TEST TAB ==================== -->
  <div class="tab-content" id="tab-test">
    <!-- Setup -->
    <div class="test-setup active" id="testSetup">
      <div class="question-card">
        <h3 style="margin-bottom:12px;">📝 选择测试题数</h3>
        <p style="color:var(--text-secondary); margin-bottom:12px;">从 2,469 个搭配中随机抽题，测试你的掌握程度</p>
        <div class="test-count-btns">
          <button class="test-count-btn" onclick="selectTestCount(10)">10 题</button>
          <button class="test-count-btn selected" onclick="selectTestCount(20)" id="countBtn20">20 题</button>
          <button class="test-count-btn" onclick="selectTestCount(50)">50 题</button>
          <button class="test-count-btn" onclick="selectTestCount(100)">100 题</button>
        </div>
        <div style="margin-top:8px; font-size:.85rem; color:var(--text-secondary);">
          <label><input type="checkbox" id="testOnlyUnmastered"> 只测试未掌握的词汇</label>
        </div>
        <button class="btn btn-primary btn-lg" onclick="startTest()" style="margin-top:20px; width:100%;">🚀 开始测试</button>
      </div>
    </div>

    <!-- Active Test -->
    <div class="test-active" id="testActive">
      <div class="test-timer" id="testTimer">⏱ 00:00</div>
      <div class="test-progress-text" id="testProgressText">1 / 20</div>
      <div class="progress-bar"><div class="progress-fill" id="testProgressFill" style="width:5%"></div></div>
      <div class="question-card">
        <div class="question-zh" id="testZh"></div>
        <div class="question-hint">选择正确的英文搭配</div>
        <div class="options-grid" id="testOptions"></div>
      </div>
    </div>

    <!-- Results -->
    <div class="test-results" id="testResults">
      <div class="result-summary">
        <div class="result-label">你的得分</div>
        <div class="result-score" id="resultScore"></div>
        <div class="result-detail" id="resultDetail"></div>
        <div class="result-detail" id="resultTime"></div>
      </div>
      <div id="wrongReviewContainer"></div>
      <div style="text-align:center; margin-top:20px; display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">
        <button class="btn btn-warning" onclick="retryWrong()">🔄 重做错题</button>
        <button class="btn btn-primary" onclick="resetTest()">📝 重新测试</button>
      </div>
    </div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Data -->
<script src="data.js"></script>

<script>
// ==================== GLOBAL STATE ====================
const APP = {
  // Memorize
  memIndex: 0,
  memList: [],
  memFlipped: false,

  // Practice
  pracChoiceCurrent: null,
  pracFillCurrent: null,
  pracChoiceScore: { correct: 0, total: 0 },
  pracFillScore: { correct: 0, total: 0 },

  // Test
  testQuestions: [],
  testIndex: 0,
  testScore: 0,
  testAnswers: [],  // {question, userAnswer, correct}
  testCount: 20,
  testTimerSec: 0,
  testTimerId: null,
};

// ==================== STORAGE ====================
function getMastered() {
  try { return new Set(JSON.parse(localStorage.getItem('pte_mastered') || '[]')); }
  catch { return new Set(); }
}
function saveMastered(set) {
  localStorage.setItem('pte_mastered', JSON.stringify([...set]));
}
function getTestHistory() {
  try { return JSON.parse(localStorage.getItem('pte_test_history') || '[]'); }
  catch { return []; }
}
function saveTestHistory(record) {
  const hist = getTestHistory();
  hist.push(record);
  if (hist.length > 50) hist.shift();
  localStorage.setItem('pte_test_history', JSON.stringify(hist));
}

// ==================== TOAST ====================
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

// ==================== TAB SWITCHING ====================
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const tabId = btn.dataset.tab;
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-' + tabId).classList.add('active');
    if (tabId === 'memorize') refreshMemorize();
    if (tabId === 'practice') refreshPractice();
    if (tabId === 'test') resetTest();
  });
});

// ==================== MEMORIZE MODE ====================
function buildMemList() {
  const search = (document.getElementById('memSearch')?.value || '').toLowerCase().trim();
  const letter = document.getElementById('memLetter')?.value || 'all';
  const filter = document.getElementById('memFilter')?.value || 'all';
  const mastered = getMastered();

  let list = [...PTE_DATA];
  if (letter !== 'all') {
    list = list.filter(e => e.word1.toLowerCase().startsWith(letter));
  }
  if (search) {
    list = list.filter(e => e.en.toLowerCase().includes(search) || e.zh.includes(search));
  }
  if (filter === 'mastered') {
    list = list.filter(e => mastered.has(e.id));
  } else if (filter === 'unmastered') {
    list = list.filter(e => !mastered.has(e.id));
  }
  return list;
}

function populateLetterFilter() {
  const letters = new Set();
  PTE_DATA.forEach(e => { if (e.word1) letters.add(e.word1[0].toLowerCase()); });
  const sel = document.getElementById('memLetter');
  sel.innerHTML = '<option value="all">全部字母</option>';
  [...letters].sort().forEach(l => {
    sel.innerHTML += `<option value="${l}">${l.toUpperCase()} (${PTE_DATA.filter(e => e.word1.toLowerCase().startsWith(l)).length})</option>`;
  });
}

function refreshMemorize() {
  APP.memList = buildMemList();
  if (APP.memList.length === 0) {
    APP.memIndex = 0;
    document.getElementById('fcFront').textContent = '没有匹配的词汇';
    document.getElementById('fcFrontPos').textContent = '';
    document.getElementById('fcBack').textContent = '';
    document.getElementById('fcBackDetail').textContent = '';
  } else {
    APP.memIndex = Math.min(APP.memIndex, APP.memList.length - 1);
    if (APP.memIndex < 0) APP.memIndex = 0;
    updateFlashcard();
  }
  updateMemStats();
  updateMasteredBtn();
}

function updateFlashcard() {
  if (APP.memList.length === 0) return;
  const entry = APP.memList[APP.memIndex];
  const card = document.getElementById('flashcard');
  APP.memFlipped = false;
  card.classList.remove('is-flipped');

  document.getElementById('fcFront').textContent = entry.en;
  document.getElementById('fcFrontPos').textContent = entry.word1 + ' ' + entry.pos1 + ' · ' + entry.word2 + ' ' + entry.pos2;
  document.getElementById('fcBack').textContent = entry.zh;
  document.getElementById('fcBackDetail').textContent = entry.en;

  document.getElementById('memProgressText').textContent =
    `${APP.memIndex + 1} / ${APP.memList.length}`;
  document.getElementById('memProgressFill').style.width =
    APP.memList.length > 0 ? `${((APP.memIndex + 1) / APP.memList.length) * 100}%` : '0%';

  updateMasteredBtn();
}

function flipCard() {
  if (APP.memList.length === 0) return;
  const card = document.getElementById('flashcard');
  APP.memFlipped = !APP.memFlipped;
  if (APP.memFlipped) {
    card.classList.add('is-flipped');
  } else {
    card.classList.remove('is-flipped');
  }
}

function nextCard() {
  if (APP.memList.length === 0) return;
  APP.memIndex = (APP.memIndex + 1) % APP.memList.length;
  updateFlashcard();
}

function prevCard() {
  if (APP.memList.length === 0) return;
  APP.memIndex = (APP.memIndex - 1 + APP.memList.length) % APP.memList.length;
  updateFlashcard();
}

function randomCard() {
  if (APP.memList.length === 0) return;
  let newIdx;
  do { newIdx = Math.floor(Math.random() * APP.memList.length); }
  while (newIdx === APP.memIndex && APP.memList.length > 1);
  APP.memIndex = newIdx;
  updateFlashcard();
}

function toggleMastered() {
  if (APP.memList.length === 0) return;
  const entry = APP.memList[APP.memIndex];
  const mastered = getMastered();
  if (mastered.has(entry.id)) {
    mastered.delete(entry.id);
  } else {
    mastered.add(entry.id);
  }
  saveMastered(mastered);
  updateMasteredBtn();
  updateMemStats();
  showToast(mastered.has(entry.id) ? '⭐ 已标记为掌握' : '已取消掌握标记');
}

function updateMasteredBtn() {
  if (APP.memList.length === 0) return;
  const entry = APP.memList[APP.memIndex];
  const mastered = getMastered();
  const btn = document.getElementById('masteredBtn');
  if (mastered.has(entry.id)) {
    btn.textContent = '✅ 已掌握 (点击取消)';
    btn.classList.add('is-mastered');
  } else {
    btn.textContent = '⭐ 标记为已掌握';
    btn.classList.remove('is-mastered');
  }
}

function updateMemStats() {
  const mastered = getMastered();
  const total = PTE_DATA.length;
  const masteredCount = [...mastered].filter(id => PTE_DATA.some(e => e.id === id)).length;
  document.getElementById('memorizeStats').innerHTML = `
    <div class="stat-item"><div class="stat-num">${total}</div><div class="stat-label">总词汇</div></div>
    <div class="stat-item"><div class="stat-num">${masteredCount}</div><div class="stat-label">已掌握</div></div>
    <div class="stat-item"><div class="stat-num">${total - masteredCount}</div><div class="stat-label">待学习</div></div>
    <div class="stat-item"><div class="stat-num">${masteredCount ? Math.round(masteredCount/total*100) : 0}%</div><div class="stat-label">掌握率</div></div>
  `;
  document.getElementById('memMasteredText').textContent = `已掌握: ${masteredCount}`;
}

// Filter events
document.getElementById('memSearch').addEventListener('input', () => { APP.memIndex = 0; refreshMemorize(); });
document.getElementById('memLetter').addEventListener('change', () => { APP.memIndex = 0; refreshMemorize(); });
document.getElementById('memFilter').addEventListener('change', () => { APP.memIndex = 0; refreshMemorize(); });

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  const activeTab = document.querySelector('.tab-content.active');
  if (!activeTab || activeTab.id !== 'tab-memorize') return;
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === 'ArrowRight') nextCard();
  if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === ' ') {
    e.preventDefault();
    flipCard();
  }
  if (e.key === 'r') randomCard();
});

// ==================== PRACTICE MODE ====================
function refreshPractice() {
  updatePracticeStats();
  nextChoice();
  nextFill();
}

function updatePracticeStats() {
  const cTotal = APP.pracChoiceScore.total;
  const cCorrect = APP.pracChoiceScore.correct;
  const fTotal = APP.pracFillScore.total;
  const fCorrect = APP.pracFillScore.correct;
  document.getElementById('practiceStats').innerHTML = `
    <div class="stat-item"><div class="stat-num">${cTotal ? Math.round(cCorrect/cTotal*100) : 0}%</div><div class="stat-label">选择题正确率</div></div>
    <div class="stat-item"><div class="stat-num">${fTotal ? Math.round(fCorrect/fTotal*100) : 0}%</div><div class="stat-label">填空题正确率</div></div>
    <div class="stat-item"><div class="stat-num">${cCorrect + fCorrect}</div><div class="stat-label">总正确数</div></div>
    <div class="stat-item"><div class="stat-num">${cTotal + fTotal}</div><div class="stat-label">总练习数</div></div>
  `;
}

// ---- Practice Sub-tabs ----
document.querySelectorAll('.practice-subtab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.practice-subtab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const subtab = btn.dataset.subtab;
    document.getElementById('practiceChoice').style.display = subtab === 'choice' ? 'block' : 'none';
    document.getElementById('practiceFill').style.display = subtab === 'fill' ? 'block' : 'none';
    if (subtab === 'choice') nextChoice();
    if (subtab === 'fill') nextFill();
  });
});

// ---- Choice Exercise ----
function nextChoice() {
  const fb = document.getElementById('choiceFeedback');
  fb.classList.remove('show', 'success', 'error');
  document.getElementById('choiceNextBtn').style.display = 'none';

  // Pick random entry
  const idx = Math.floor(Math.random() * PTE_DATA.length);
  const correct = PTE_DATA[idx];
  APP.pracChoiceCurrent = correct;

  // Generate 3 wrong options
  const wrongOptions = [];
  const usedIds = new Set([correct.id]);
  while (wrongOptions.length < 3) {
    const wi = Math.floor(Math.random() * PTE_DATA.length);
    if (!usedIds.has(PTE_DATA[wi].id)) {
      usedIds.add(PTE_DATA[wi].id);
      wrongOptions.push(PTE_DATA[wi]);
    }
  }

  // Shuffle options
  const options = [correct, ...wrongOptions];
  for (let i = options.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [options[i], options[j]] = [options[j], options[i]];
  }

  document.getElementById('choiceZh').textContent = correct.zh;
  const grid = document.getElementById('choiceOptions');
  grid.innerHTML = options.map((opt, i) => `
    <button class="option-btn" onclick="answerChoice(${opt.id}, this)" data-opt-id="${opt.id}">
      ${String.fromCharCode(65 + i)}. ${opt.en}
    </button>
  `).join('');
}

function answerChoice(chosenId, btnEl) {
  if (!APP.pracChoiceCurrent) return;
  const correct = APP.pracChoiceCurrent;
  const fb = document.getElementById('choiceFeedback');
  const allBtns = document.querySelectorAll('#choiceOptions .option-btn');

  // Disable all buttons
  allBtns.forEach(b => b.style.pointerEvents = 'none');

  APP.pracChoiceScore.total++;

  if (chosenId === correct.id) {
    btnEl.classList.add('correct');
    APP.pracChoiceScore.correct++;
    fb.textContent = '✅ 正确！';
    fb.className = 'feedback-box show success';
  } else {
    btnEl.classList.add('wrong');
    // Highlight correct answer
    allBtns.forEach(b => { if (parseInt(b.dataset.optId) === correct.id) b.classList.add('show-correct'); });
    fb.textContent = `❌ 错误！正确答案是: ${correct.en}`;
    fb.className = 'feedback-box show error';
  }

  document.getElementById('choiceNextBtn').style.display = 'inline-block';
  updatePracticeStats();
}

// ---- Fill-in-blank Exercise ----
function nextFill() {
  const fb = document.getElementById('fillFeedback');
  fb.classList.remove('show', 'success', 'error');
  document.getElementById('fillNextBtn').style.display = 'none';
  const fillInput = document.getElementById('fillInput');
  fillInput.value = '';
  fillInput.classList.remove('correct', 'wrong');
  fillInput.disabled = false;
  fillInput.focus();

  const idx = Math.floor(Math.random() * PTE_DATA.length);
  const entry = PTE_DATA[idx];
  APP.pracFillCurrent = entry;

  // Randomly hide word1 or word2
  const hideWord1 = Math.random() > 0.5;

  let promptHtml, answer;
  if (hideWord1) {
    answer = entry.word1;
    let rest = entry.en;
    // Replace first occurrence of word1 (case insensitive)
    const regex = new RegExp(entry.word1.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'i');
    rest = rest.replace(regex, '_____');
    promptHtml = rest;
  } else {
    answer = entry.word2;
    const regex = new RegExp(entry.word2.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'i');
    let rest = entry.en;
    rest = rest.replace(regex, '_____');
    promptHtml = rest;
  }

  document.getElementById('fillPrompt').innerHTML = `<strong>${promptHtml}</strong>`;
  document.getElementById('fillZh').textContent = `中文: ${entry.zh}`;
  document.getElementById('fillInput').dataset.answer = answer;
  document.getElementById('fillInput').dataset.pos = hideWord1 ? entry.pos1 : entry.pos2;
}

function checkFillAnswer() {
  if (!APP.pracFillCurrent) return;
  const input = document.getElementById('fillInput');
  const userAnswer = input.value.trim().toLowerCase();
  const correctAnswer = input.dataset.answer.toLowerCase();
  const fb = document.getElementById('fillFeedback');

  APP.pracFillScore.total++;

  if (userAnswer === correctAnswer) {
    input.classList.add('correct');
    APP.pracFillScore.correct++;
    fb.textContent = '✅ 正确！';
    fb.className = 'feedback-box show success';
  } else {
    input.classList.add('wrong');
    fb.textContent = `❌ 错误！正确答案是: ${input.dataset.answer} (你输入的是: ${input.value || '(空)'})`;
    fb.className = 'feedback-box show error';
  }

  document.getElementById('fillNextBtn').style.display = 'inline-block';
  input.disabled = true;
  updatePracticeStats();
}

function showFillHint() {
  if (!APP.pracFillCurrent) return;
  const input = document.getElementById('fillInput');
  const answer = input.dataset.answer;
  const pos = input.dataset.pos || '';
  showToast(`💡 词性: ${pos}，首字母: ${answer[0]}...，长度: ${answer.length} 个字母`);
}

// Enter key for fill-in-blank
document.getElementById('fillInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') checkFillAnswer();
});

// ==================== TEST MODE ====================
function selectTestCount(n) {
  APP.testCount = n;
  document.querySelectorAll('.test-count-btn').forEach(b => b.classList.remove('selected'));
  // Find button by text content
  document.querySelectorAll('.test-count-btn').forEach(b => {
    if (b.textContent.trim().startsWith(String(n))) b.classList.add('selected');
  });
}

function startTest() {
  const onlyUnmastered = document.getElementById('testOnlyUnmastered').checked;
  let pool = [...PTE_DATA];

  if (onlyUnmastered) {
    const mastered = getMastered();
    pool = pool.filter(e => !mastered.has(e.id));
  }

  if (pool.length < 4) {
    showToast('可用词汇不足，请降低筛选条件');
    return;
  }

  // Shuffle and pick
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  APP.testQuestions = pool.slice(0, Math.min(APP.testCount, pool.length));
  APP.testIndex = 0;
  APP.testScore = 0;
  APP.testAnswers = [];
  APP.testTimerSec = 0;

  document.getElementById('testSetup').classList.remove('active');
  document.getElementById('testActive').classList.add('active');
  document.getElementById('testResults').classList.remove('active');

  // Start timer
  clearInterval(APP.testTimerId);
  APP.testTimerId = setInterval(() => {
    APP.testTimerSec++;
    const m = Math.floor(APP.testTimerSec / 60);
    const s = APP.testTimerSec % 60;
    document.getElementById('testTimer').textContent = `⏱ ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }, 1000);

  renderTestQuestion();
}

function renderTestQuestion() {
  if (APP.testIndex >= APP.testQuestions.length) {
    finishTest();
    return;
  }

  const q = APP.testQuestions[APP.testIndex];
  document.getElementById('testProgressText').textContent = `${APP.testIndex + 1} / ${APP.testQuestions.length}`;
  document.getElementById('testProgressFill').style.width = `${((APP.testIndex + 1) / APP.testQuestions.length) * 100}%`;
  document.getElementById('testZh').textContent = q.zh;

  // Generate 3 wrong options
  const wrongOpts = [];
  const usedIds = new Set([q.id]);
  while (wrongOpts.length < 3) {
    const wi = Math.floor(Math.random() * PTE_DATA.length);
    if (!usedIds.has(PTE_DATA[wi].id)) {
      usedIds.add(PTE_DATA[wi].id);
      wrongOpts.push(PTE_DATA[wi]);
    }
  }

  const options = [q, ...wrongOpts];
  for (let i = options.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [options[i], options[j]] = [options[j], options[i]];
  }

  document.getElementById('testOptions').innerHTML = options.map((opt, i) => `
    <button class="option-btn" data-opt-id="${opt.id}" onclick="answerTest(${opt.id}, this)">
      ${String.fromCharCode(65 + i)}. ${opt.en}
    </button>
  `).join('');
}

function answerTest(chosenId, btnEl) {
  const q = APP.testQuestions[APP.testIndex];
  const allBtns = document.querySelectorAll('#testOptions .option-btn');
  allBtns.forEach(b => b.style.pointerEvents = 'none');

  const isCorrect = chosenId === q.id;
  if (isCorrect) {
    btnEl.classList.add('correct');
    APP.testScore++;
  } else {
    btnEl.classList.add('wrong');
    // Highlight correct answer
    allBtns.forEach(b => {
      if (parseInt(b.getAttribute('data-opt-id')) === q.id) b.classList.add('show-correct');
    });
  }

  APP.testAnswers.push({
    question: q,
    userChoseId: chosenId,
    correct: isCorrect
  });

  // Auto-advance after short delay
  setTimeout(() => {
    APP.testIndex++;
    renderTestQuestion();
  }, 600);
}

function finishTest() {
  clearInterval(APP.testTimerId);
  document.getElementById('testActive').classList.remove('active');
  document.getElementById('testResults').classList.add('active');

  const total = APP.testQuestions.length;
  const score = APP.testScore;
  const pct = Math.round(score / total * 100);

  document.getElementById('resultScore').textContent = pct + '%';
  document.getElementById('resultDetail').textContent = `正确 ${score} / ${total} 题`;
  const m = Math.floor(APP.testTimerSec / 60);
  const s = APP.testTimerSec % 60;
  document.getElementById('resultTime').textContent = `用时: ${m}分${s}秒`;

  // Save history
  saveTestHistory({
    date: new Date().toISOString(),
    score, total, pct,
    time: APP.testTimerSec
  });

  // Render wrong answers
  const wrongAnswers = APP.testAnswers.filter(a => !a.correct);
  const container = document.getElementById('wrongReviewContainer');
  if (wrongAnswers.length === 0) {
    container.innerHTML = `
      <div class="question-card" style="text-align:center;">
        <div style="font-size:3rem;">🎉</div>
        <div style="font-size:1.2rem; font-weight:700; margin-top:8px;">全部正确！太棒了！</div>
      </div>`;
  } else {
    container.innerHTML = `<h3 style="margin-bottom:12px;">📋 错题回顾 (${wrongAnswers.length} 题)</h3>` +
      wrongAnswers.map((a, i) => `
        <div class="wrong-review">
          <div class="wrong-review-header">❌ 第 ${APP.testAnswers.indexOf(a) + 1} 题</div>
          <div class="wrong-review-body">
            <div class="wrong-review-row">中文: <strong>${a.question.zh}</strong></div>
            <div class="wrong-review-row">你的选择: <strong>${PTE_DATA.find(e => e.id === a.userChoseId)?.en || 'N/A'}</strong></div>
            <div class="wrong-review-row">正确答案: <em>${a.question.en}</em></div>
          </div>
        </div>
      `).join('');
  }
}

function retryWrong() {
  const wrongAnswers = APP.testAnswers.filter(a => !a.correct);
  if (wrongAnswers.length === 0) {
    showToast('没有错题可重做！');
    return;
  }
  APP.testQuestions = wrongAnswers.map(a => a.question);
  APP.testIndex = 0;
  APP.testScore = 0;
  APP.testAnswers = [];
  APP.testTimerSec = 0;
  clearInterval(APP.testTimerId);
  APP.testTimerId = setInterval(() => {
    APP.testTimerSec++;
    const mm = Math.floor(APP.testTimerSec / 60);
    const ss = APP.testTimerSec % 60;
    document.getElementById('testTimer').textContent = `⏱ ${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
  }, 1000);

  document.getElementById('testResults').classList.remove('active');
  document.getElementById('testActive').classList.add('active');
  renderTestQuestion();
}

function resetTest() {
  clearInterval(APP.testTimerId);
  document.getElementById('testActive').classList.remove('active');
  document.getElementById('testResults').classList.remove('active');
  document.getElementById('testSetup').classList.add('active');
}

// ==================== INIT ====================
function init() {
  populateLetterFilter();
  refreshMemorize();
  updateMemStats();
}
